<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>썸코치 · 썸 온도부터 답장까지</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  :root{
    --ink:#160F22; --ink2:#211735; --ink3:#2C2042;
    --blush:#FF6F91; --peach:#FFB36B; --rose:#FF9DB6;
    --cream:#F6EEF4; --muted:#9E92B6; --line:rgba(255,255,255,.09);
  }
  body{
    font-family:'Noto Sans KR',system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:
      radial-gradient(1100px 560px at 50% -12%, rgba(255,111,145,.24), transparent 60%),
      radial-gradient(820px 480px at 108% 2%, rgba(255,179,107,.14), transparent 55%),
      var(--ink);
    color:var(--cream); min-height:100vh;
    display:flex; justify-content:center; padding:30px 16px 70px;
  }
  .wrap{ width:100%; max-width:470px; }

  .logo{ font-family:'Jua',sans-serif; font-size:30px; display:flex; align-items:center; gap:8px; letter-spacing:-.5px; }
  .tagline{ font-family:'Jua',sans-serif; font-size:29px; margin:14px 0 6px; line-height:1.22; letter-spacing:-.5px; font-weight:400; }
  .tagline span{ background:linear-gradient(90deg,var(--blush),var(--peach)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .sub{ color:var(--muted); font-size:14.5px; line-height:1.5; margin:0 0 22px; font-weight:300; }

  .panel{ background:var(--ink2); border:1px solid var(--line); border-radius:22px; padding:20px 18px; }
  .lbl{ display:block; font-size:13px; color:var(--muted); margin:0 0 9px; font-weight:500; }
  .lbl.mt{ margin-top:18px; }

  .pills{ display:flex; flex-wrap:wrap; gap:8px; }
  .pill{ font-family:inherit; font-size:13.5px; color:var(--cream); background:var(--ink3);
    border:1px solid var(--line); padding:9px 14px; border-radius:999px; cursor:pointer; transition:transform .12s, box-shadow .2s, background .2s; }
  .pill:hover{ transform:translateY(-1px); }
  .pill.on{ background:linear-gradient(90deg,var(--blush),var(--peach)); color:#160F22; font-weight:700; border-color:transparent; box-shadow:0 6px 18px rgba(255,111,145,.28); }

  .ta{ width:100%; min-height:128px; resize:vertical; margin-top:2px; padding:13px 14px; font-family:inherit;
    font-size:15px; line-height:1.55; color:var(--cream); background:var(--ink3); border:1px solid var(--line); border-radius:14px; transition:border .2s, box-shadow .2s; }
  .ta::placeholder{ color:#6F6488; }
  .ta:focus{ outline:none; border-color:var(--blush); box-shadow:0 0 0 3px rgba(255,111,145,.18); }
  .memo{ width:100%; margin-top:14px; padding:12px 14px; font-family:inherit; font-size:14px; color:var(--cream);
    background:var(--ink3); border:1px solid var(--line); border-radius:14px; transition:border .2s, box-shadow .2s; }
  .memo::placeholder{ color:#6F6488; }
  .memo:focus{ outline:none; border-color:var(--blush); box-shadow:0 0 0 3px rgba(255,111,145,.18); }

  .quota{ font-size:12.5px; color:var(--muted); text-align:center; margin:18px 0 10px; }
  .quota b{ color:var(--rose); font-weight:700; }
  .cta{ width:100%; font-family:'Jua',sans-serif; font-size:17px; letter-spacing:-.3px; color:#160F22;
    background:linear-gradient(90deg,var(--blush),var(--peach)); border:none; border-radius:16px; padding:15px;
    cursor:pointer; transition:transform .12s, box-shadow .2s, filter .2s; box-shadow:0 10px 26px rgba(255,111,145,.3); }
  .cta:hover{ transform:translateY(-2px); }
  .cta:active{ transform:translateY(0); }
  .cta:disabled{ filter:grayscale(.5) brightness(.8); cursor:not-allowed; transform:none; box-shadow:none; }

  .error{ margin-top:16px; background:rgba(255,111,145,.1); border:1px solid rgba(255,111,145,.3);
    color:var(--rose); font-size:13.5px; padding:12px 14px; border-radius:12px; line-height:1.5; }

  .typing{ display:flex; gap:6px; align-items:center; background:var(--ink3); width:fit-content;
    padding:14px 18px; border-radius:18px 18px 18px 4px; margin-top:18px; }
  .typing span{ width:8px; height:8px; border-radius:50%; background:var(--muted); animation:bnc 1.2s infinite ease-in-out; }
  .typing span:nth-child(2){ animation-delay:.18s; } .typing span:nth-child(3){ animation-delay:.36s; }
  @keyframes bnc{ 0%,60%,100%{ transform:translateY(0); opacity:.4 } 30%{ transform:translateY(-6px); opacity:1 } }
  @keyframes scin{ from{ opacity:0; transform:translateY(12px) } to{ opacity:1; transform:translateY(0) } }

  .score{ position:relative; border-radius:22px; padding:22px 20px 18px; margin-top:18px; overflow:hidden;
    background:linear-gradient(135deg,#FF6F91,#FF8FA3 45%,#FFB36B); color:#160F22;
    box-shadow:0 14px 40px rgba(255,111,145,.35); animation:scin .5s both; }
  .score::after{ content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(circle at 82% -10%, rgba(255,255,255,.4), transparent 45%); }
  .score > *{ position:relative; }
  .score-top{ display:flex; align-items:center; gap:7px; font-family:'Jua',sans-serif; font-size:15px; opacity:.92; }
  .score-num{ font-family:'Jua',sans-serif; font-size:64px; line-height:1; margin:6px 0 2px; letter-spacing:-1px; }
  .score-num small{ font-size:22px; opacity:.55; font-family:'Noto Sans KR',sans-serif; font-weight:700; }
  .temp{ font-family:'Jua',sans-serif; font-size:19px; margin-bottom:14px; }
  .bar{ position:relative; height:12px; border-radius:999px; background:rgba(22,15,34,.18); margin:4px 0 6px; }
  .bar-fill{ position:absolute; left:0; top:0; bottom:0; border-radius:999px; background:rgba(22,15,34,.82); transition:width .9s cubic-bezier(.2,.7,.3,1); }
  .bar-ends{ display:flex; justify-content:space-between; font-size:14px; opacity:.75; }
  .verdict{ font-size:14.5px; font-weight:500; line-height:1.5; margin:15px 0 12px; }
  .signals{ display:flex; flex-direction:column; gap:7px; }
  .signal{ font-size:13px; background:rgba(255,255,255,.36); border-radius:10px; padding:8px 11px; line-height:1.45; }
  .watermark{ display:flex; justify-content:space-between; align-items:center; margin-top:15px; padding-top:13px; border-top:1px solid rgba(22,15,34,.16); }
  .wm-name{ font-family:'Jua',sans-serif; font-size:13.5px; }
  .share{ font-family:inherit; font-weight:700; font-size:12.5px; color:#160F22;
    background:rgba(255,255,255,.62); border:none; padding:8px 13px; border-radius:999px; cursor:pointer; transition:background .2s; }
  .share:hover{ background:rgba(255,255,255,.88); }
  .share-hint{ text-align:center; font-size:11.5px; color:var(--muted); margin-top:9px; }

  .res-head{ font-size:14px; color:var(--muted); margin:24px 2px 12px; font-weight:500; }
  .card{ background:var(--ink2); border:1px solid var(--line); border-radius:18px; padding:15px 15px 13px;
    margin-bottom:12px; animation:scin .45s both cubic-bezier(.2,.7,.3,1); }
  .card-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:11px; }
  .tag{ font-size:12px; font-weight:700; color:#160F22; background:linear-gradient(90deg,var(--rose),var(--peach)); padding:4px 11px; border-radius:999px; }
  .copy{ font-family:inherit; font-size:12.5px; color:var(--muted);
    background:transparent; border:1px solid var(--line); padding:6px 11px; border-radius:999px; cursor:pointer; transition:color .2s, border .2s; }
  .copy:hover{ color:var(--cream); border-color:var(--rose); }
  .copy.done{ color:var(--rose); border-color:var(--rose); }
  .bubble{ background:linear-gradient(135deg,var(--blush),var(--peach)); color:#160F22; font-size:15px; line-height:1.55;
    font-weight:500; padding:13px 15px; border-radius:16px 16px 4px 16px; white-space:pre-wrap; word-break:break-word; }
  .tip{ font-size:12.5px; color:var(--muted); margin-top:10px; line-height:1.5; }

  .gate{ margin-top:22px; background:var(--ink2); border:1px solid rgba(255,111,145,.28); border-radius:20px; padding:24px 18px; text-align:center; }
  .gate-ic{ font-size:30px; margin-bottom:8px; }
  .gate h3{ font-family:'Jua',sans-serif; font-size:18px; margin:0 0 6px; font-weight:400; }
  .gate p{ color:var(--muted); font-size:13.5px; margin:0 0 16px; line-height:1.5; }
  .reset{ font-family:inherit; font-size:12.5px; color:var(--muted); background:none; border:none; text-decoration:underline; cursor:pointer; margin-top:14px; }

  .premium{ margin-top:26px; border-radius:20px; padding:1px; background:linear-gradient(135deg,rgba(255,111,145,.5),rgba(255,179,107,.5)); }
  .premium-in{ background:var(--ink2); border-radius:19px; padding:20px 18px; }
  .premium-h{ font-family:'Jua',sans-serif; font-size:16px; margin-bottom:12px; }
  .feat{ display:flex; gap:9px; align-items:flex-start; font-size:13.5px; color:var(--cream); margin:9px 0; line-height:1.45; }
  .feat .dot{ color:var(--rose); flex:none; margin-top:1px; }
  .pbtn{ width:100%; margin-top:14px; font-family:'Jua',sans-serif; font-size:14.5px; color:#160F22; background:linear-gradient(90deg,var(--blush),var(--peach)); border:none; border-radius:13px; padding:12px; cursor:pointer; }

  .note{ text-align:center; color:#6F6488; font-size:11.5px; margin-top:22px; line-height:1.55; }
  @media (prefers-reduced-motion: reduce){ *{ animation:none!important; transition:none!important } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const REL_OPTIONS = ["썸 타는 중", "짝사랑", "소개팅·매칭앱", "연인", "친구에서 썸으로"];
const TONE_OPTIONS = ["자연스럽게", "다정하게", "가볍게 ㅋㅋ", "살짝 밀당", "진솔하게"];

function App() {
  const [relationship, setRelationship] = useState(REL_OPTIONS[0]);
  const [tone, setTone] = useState(TONE_OPTIONS[0]);
  const [convo, setConvo] = useState("");
  const [memo, setMemo] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [copied, setCopied] = useState(null);
  const [shared, setShared] = useState(false);
  const [shownScore, setShownScore] = useState(0);
  const [left, setLeft] = useState(3);
  const [gate, setGate] = useState(false);

  useEffect(() => {
    if (!result) { setShownScore(0); return; }
    const target = Math.max(0, Math.min(100, Number(result.score) || 0));
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) { setShownScore(target); return; }
    setShownScore(0);
    let cur = 0;
    const step = Math.max(1, Math.round(target / 28));
    const id = setInterval(() => {
      cur += step;
      if (cur >= target) { cur = target; clearInterval(id); }
      setShownScore(cur);
    }, 28);
    return () => clearInterval(id);
  }, [result]);

  async function analyze() {
    if (left <= 0) { setGate(true); setResult(null); return; }
    if (!convo.trim() || loading) return;
    setLoading(true); setError(""); setResult(null); setGate(false);
    try {
      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ relationship, convo, tone, memo }),
      });
      const data = await res.json();
      if (!res.ok || data.error) throw new Error(data.error || "fail");
      if (data && Array.isArray(data.replies) && data.replies.length) {
        setResult({
          score: data.score,
          temperature: data.temperature || "",
          verdict: data.verdict || "",
          signals: Array.isArray(data.signals) ? data.signals : [],
          replies: data.replies.slice(0, 3),
        });
        setLeft((n) => n - 1);
      } else throw new Error("bad");
    } catch (e) {
      setError("분석을 만들지 못했어요. 대화를 조금 더 붙여넣고 다시 시도해 주세요.");
    } finally {
      setLoading(false);
    }
  }

  function copyReply(text, i) {
    try { navigator.clipboard.writeText(text); } catch (e) {}
    setCopied(i);
    setTimeout(() => setCopied((c) => (c === i ? null : c)), 1500);
  }

  function shareResult() {
    if (!result) return;
    const t = "내 썸 온도는 " + result.score + "점! " + result.temperature + "\n\"" + result.verdict + "\"\n\n— 썸코치에서 분석함";
    try { navigator.clipboard.writeText(t); } catch (e) {}
    setShared(true);
    setTimeout(() => setShared(false), 1700);
  }

  return (
    <div className="wrap">
      <header>
        <div className="logo">💘 썸코치</div>
        <h1 className="tagline">썸 온도부터 답장까지,<br /><span>3초</span> 만에.</h1>
        <p className="sub">주고받은 카톡을 붙여넣으면, 호감도 분석과 보낼 답장을 한 번에 만들어 줘요.</p>
      </header>

      <section className="panel">
        <span className="lbl">상대와 나는?</span>
        <div className="pills">
          {REL_OPTIONS.map((o) => (
            <button key={o} className={"pill" + (relationship === o ? " on" : "")} onClick={() => setRelationship(o)}>{o}</button>
          ))}
        </div>

        <span className="lbl mt">주고받은 대화</span>
        <textarea className="ta" value={convo} onChange={(e) => setConvo(e.target.value)}
          placeholder={"카톡 대화를 붙여넣어 주세요.\n예)\n상대: 오늘 뭐 했어?\n나: 그냥 집에 있었지 ㅎㅎ 너는?\n상대: 나도! 갑자기 네 생각나서 ㅋㅋ"}></textarea>

        <span className="lbl mt">어떤 느낌으로 답할까?</span>
        <div className="pills">
          {TONE_OPTIONS.map((o) => (
            <button key={o} className={"pill" + (tone === o ? " on" : "")} onClick={() => setTone(o)}>{o}</button>
          ))}
        </div>

        <input className="memo" value={memo} onChange={(e) => setMemo(e.target.value)}
          placeholder="상황 메모 (선택) — 예: 자연스럽게 만나자고 하고 싶어요" />

        <div className="quota">무료 체험 <b>{left}회</b> 남음</div>
        <button className="cta" onClick={analyze} disabled={loading || !convo.trim()}>
          {loading ? "AI가 대화 읽는 중…" : "썸 온도 + 답장 분석하기"}
        </button>
      </section>

      {error && <div className="error">{error}</div>}
      {loading && <div className="typing"><span></span><span></span><span></span></div>}

      {result && !loading && (
        <React.Fragment>
          <section className="score">
            <div className="score-top">💘 썸 온도</div>
            <div className="score-num">{shownScore}<small>/100</small></div>
            <div className="temp">{result.temperature}</div>
            <div className="bar"><div className="bar-fill" style={{ width: shownScore + "%" }}></div></div>
            <div className="bar-ends"><span>🧊</span><span>🔥</span></div>
            {result.verdict && <div className="verdict">{result.verdict}</div>}
            {result.signals.length > 0 && (
              <div className="signals">
                {result.signals.map((s, i) => <div className="signal" key={i}>· {s}</div>)}
              </div>
            )}
            <div className="watermark">
              <span className="wm-name">💘 썸코치</span>
              <button className="share" onClick={shareResult}>{shared ? "✓ 복사됨" : "🔗 결과 복사"}</button>
            </div>
          </section>
          <p className="share-hint">📸 이 카드를 캡처해서 친구에게 공유해보세요</p>

          <section>
            <div className="res-head">이렇게 답해보는 건 어때요?</div>
            {result.replies.map((r, i) => (
              <div className="card" key={i} style={{ animationDelay: (i * 0.09) + "s" }}>
                <div className="card-top">
                  <span className="tag">{r.label}</span>
                  <button className={"copy" + (copied === i ? " done" : "")} onClick={() => copyReply(r.message, i)}>
                    {copied === i ? "✓ 복사됨" : "복사"}
                  </button>
                </div>
                <div className="bubble">{r.message}</div>
                {r.tip && <div className="tip">💡 {r.tip}</div>}
              </div>
            ))}
          </section>
        </React.Fragment>
      )}

      {gate && (
        <section className="gate">
          <div className="gate-ic">🔒</div>
          <h3>무료 체험을 모두 썼어요</h3>
          <p>프리미엄으로 업그레이드하면 무제한 분석과<br />더 깊은 해석을 받을 수 있어요.</p>
          <button className="pbtn">프리미엄 구독하기 · 월 2,900원</button>
          <button className="reset" onClick={() => { setLeft(3); setGate(false); }}>프로토타입: 체험 다시 채우기</button>
        </section>
      )}

      <section className="premium">
        <div className="premium-in">
          <div className="premium-h">✨ 프리미엄이 되면</div>
          <div className="feat"><span className="dot">◆</span> 썸 온도 분석 무제한 — 대화가 바뀔 때마다</div>
          <div className="feat"><span className="dot">◆</span> 더 깊은 해석 — 상대 성향·다음 단계 전략까지</div>
          <div className="feat"><span className="dot">◆</span> 상황별 시나리오 — 첫 연락 · 데이트 신청 · 화해 · 재회</div>
          <button className="pbtn">프리미엄 구독하기 · 월 2,900원</button>
        </div>
      </section>

      <p className="note">재미로 보는 분석이에요 🙂 맛보기 버전이라, 앞으로 더 정교해져요.</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
